<header class="bg-[#090f1b] p-4 shadow">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-2">
      <a [routerLink]="['/']" class="flex items-center gap-2">
        <img src="assets/logo3.svg" alt="Logo" class="h-10 w-10" />
        <div class="font-orbitron font-bold text-xl group cursor-pointer">
        <span class="text-white group-hover:text-pink-300 transition-colors"> Game</span>
        <span class="text-pink-500 group-hover:text-pink-300 transition-colors">Control </span>
        </div>
      </a>
    </div>

    <div class="font-orbitron flex items-center gap-8 text-white text-sm font-medium">
      <a

        class="hover:text-pink-400 cursor-pointer transition-colors text-xl">
        Ver Jogos
      </a>

      <!-- Usuário não está logado -->
      <ng-container *ngIf="!authService.user(); else logged">
        <a
          [routerLink]="['/register']"
          class="hover:text-pink-400 cursor-pointer transition-colors text-xl">
          Registrar
        </a>
        <a
          [routerLink]="['/login']"
          class="hover:text-pink-400 cursor-pointer transition-colors text-xl">
          Login
        </a>
      </ng-container>

      <!-- Usuário está logado -->
      <ng-template #logged>
        <a
          [routerLink]="['/user', authService.user()?.id]"
          class="hover:text-pink-400 cursor-pointer transition-colors text-xl"
        >
          Olá, {{ authService.user()?.nomeUsuario }}
        </a>
        <a (click)="logout()" class="hover:text-pink-400 cursor-pointer transition-colors text-xl">
          Logout
        </a>
      </ng-template>
    </div>
  </div>
</header>
