<div
  *ngIf="loading"
  class="w-full min-h-screen flex items-center justify-center bg-[#050816]"
>
  <p class="text-white text-3xl font-orbitron animate-pulse">
    Carregando jogos...
  </p>
</div>

<div
  *ngIf="!loading"
  class="w-full min-h-screen bg-[#050816] px-6 md:px-16 lg:px-24 py-10"
>
  <!-- Paginação superior -->
  <div class="flex items-center justify-center gap-6 mb-10">
    <button
      (click)="prev()"
      [disabled]="page === 0"
      class="text-5xl font-bold text-pink-500 disabled:text-gray-600
             hover:scale-110 transition duration-300 cursor-pointer"
    >
      ‹
    </button>

    <p class="text-lg text-white font-orbitron tracking-wider">
      Página {{ page + 1 }}
    </p>

    <button
      (click)="next()"
      [disabled]="(page + 1) * pageSize >= games.length"
      class="text-5xl font-bold text-cyan-400 disabled:text-gray-600
             hover:scale-110 transition duration-300 cursor-pointer"
    >
      ›
    </button>
  </div>

  <!-- Grid dos jogos -->
  <div
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-5"
  >
    <div
      *ngFor="let game of paginated"
      class="group flex flex-col items-center"
    >
      <a [routerLink]="'/games/' + game.id" class="w-full">
        <div
          class="bg-[#111827] rounded-2xl overflow-hidden
                 shadow-lg shadow-pink-500/10
                 hover:shadow-pink-500/30
                 hover:-translate-y-2
                 transition-all duration-300"
        >
          <img
            [src]="getCoverUrl(game)"
            [alt]="game.title"
            class="w-full aspect-[2/3] object-cover
                   group-hover:scale-105
                   transition duration-300"
          />
        </div>
      </a>

      <h3
        class="font-orbitron mt-3 text-center text-white font-semibold
               text-sm md:text-base truncate w-full"
      >
        {{ game.title }}
      </h3>
    </div>
  </div>

  <!-- Paginação inferior -->
  <div class="flex items-center justify-center gap-6 mt-12">
    <button
      (click)="prev()"
      [disabled]="page === 0"
      class="text-5xl font-bold text-pink-500 disabled:text-gray-600
             hover:scale-110 transition duration-300 cursor-pointer"
    >
      ‹
    </button>

    <p class="text-lg text-white font-orbitron tracking-wider">
      Página {{ page + 1 }}
    </p>

    <button
      (click)="next()"
      [disabled]="(page + 1) * pageSize >= games.length"
      class="text-5xl font-bold text-cyan-400 disabled:text-gray-600
             hover:scale-110 transition duration-300 cursor-pointer"
    >
      ›
    </button>
  </div>
</div>
